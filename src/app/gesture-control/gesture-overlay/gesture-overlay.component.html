<!-- Vidéo cachée pour MediaPipe -->
<video #videoEl class="gesture-video" autoplay muted playsinline></video>

<!-- Curseur virtuel -->
<div
  *ngIf="active"
  class="gesture-cursor"
  [class.clicking]="isClicking"
  [style.left.px]="cursorX"
  [style.top.px]="cursorY"
>
  <div class="cursor-ring"></div>
  <div class="cursor-dot"></div>
</div>

<!-- Badge geste -->
<div class="gesture-badge" [class.visible]="!!currentGesture">
  <span class="badge-icon">{{ gestureInfo?.icon }}</span>
  <span class="badge-label">{{ gestureInfo?.label }}</span>
</div>

<!-- Bouton ON/OFF -->
<button class="gesture-toggle" (click)="toggleActive()">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
    <path d="M18 11V6a2 2 0 0 0-4 0v5"/>
    <path d="M14 10V4a2 2 0 0 0-4 0v6"/>
    <path d="M10 10.5V6a2 2 0 0 0-4 0v8"/>
    <path d="M6 14l-1.5-2A2 2 0 0 0 1 13v0a2 2 0 0 0 2 2l2 3a4 4 0 0 0 4 4h4a4 4 0 0 0 4-4v-5"/>
    <path d="M18 11a2 2 0 0 1 4 0v3"/>
  </svg>
  <span>{{ active ? 'ON' : 'OFF' }}</span>
</button>
