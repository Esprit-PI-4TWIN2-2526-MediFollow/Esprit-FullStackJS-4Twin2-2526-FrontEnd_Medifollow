<div class="panel">
  <h2 class="panel-title">Navigation sans contact</h2>

  <!-- Statut -->
  <div class="status-row">
    <span class="status-dot" [class.active]="cameraActive"></span>
    <span>{{ cameraActive ? 'Caméra active' : 'Caméra inactive' }}</span>
  </div>

  <!-- Dernier geste -->
  <div class="last-gesture">
    <span *ngIf="lastGesture" class="gesture-tag">{{ lastGesture }}</span>
    <span *ngIf="!lastGesture" class="muted">Aucun geste détecté</span>
  </div>

  <!-- Référence des gestes -->
  <div class="gesture-ref">
    <div class="ref-title">Gestes disponibles</div>
    <div class="ref-grid">
      <div *ngFor="let item of gestureMap" class="ref-item">
        <span class="ref-icon">{{ item.icon }}</span>
        <div>
          <div class="ref-gesture">{{ item.gesture }}</div>
          <div class="ref-action">{{ item.action }}</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Journal clinique -->
  <div *ngIf="auditLogs.length" class="audit">
    <div class="ref-title">Journal ({{ auditLogs.length }})</div>
    <div class="audit-list">
      <div *ngFor="let log of auditLogs.slice(-5)" class="audit-item">
        <span class="audit-time">{{ log.timestamp | date:'HH:mm:ss' }}</span>
        <span class="audit-gesture">{{ log.gesture }}</span>
      </div>
    </div>
    <button class="btn-flush" (click)="flushLogs()">Exporter et vider</button>
  </div>
</div>
