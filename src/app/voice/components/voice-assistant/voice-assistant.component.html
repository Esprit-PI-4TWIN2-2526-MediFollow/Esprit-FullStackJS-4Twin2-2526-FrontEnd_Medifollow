<div class="voice-assistant-shell" [class.voice-assistant-shell--active]="state.activated">
  <button
    type="button"
    class="voice-assistant-button"
    [class.voice-assistant-button--listening]="state.listening"
    [class.voice-assistant-button--speaking]="state.status === 'speaking'"
    (click)="onToggleListening()"
    aria-label="Toggle voice assistant"
  >
    <span class="voice-assistant-pulse" *ngIf="state.listening"></span>
    <span class="voice-assistant-icon">Mic</span>
  </button>

  <div class="voice-assistant-panel">
    <p class="voice-assistant-title">Skander</p>
    <p class="voice-assistant-message">{{ state.message }}</p>
    <p class="voice-assistant-heard" *ngIf="state.lastHeard">Heard: {{ state.lastHeard }}</p>
  </div>
</div>
