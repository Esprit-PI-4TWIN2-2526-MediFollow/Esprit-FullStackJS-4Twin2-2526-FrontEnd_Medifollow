<div class="p-6 max-w-3xl mx-auto">
  <div class="mb-6">
    <h1 class="text-3xl font-bold text-gray-900">New Consultation</h1>
    <p class="text-gray-600 mt-1">Schedule a telemedicine consultation</p>
  </div>

  <div *ngIf="error" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-6">
    {{ error }}
  </div>

  <form (ngSubmit)="onSubmit()" class="bg-white rounded-lg shadow-sm p-6 space-y-6">
    <!-- Patient Selection -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Patient *</label>
      <select
        [(ngModel)]="selectedPatientId"
        name="patient"
        required
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent">
        <option value="">Select a patient</option>
        <option *ngFor="let patient of patients" [value]="patient._id">
          {{ patient.firstName }} {{ patient.lastName }} - {{ patient.email }}
        </option>
      </select>
    </div>

    <!-- Type -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Consultation type *</label>
      <div class="grid grid-cols-3 gap-4">
        <label class="flex items-center p-4 border rounded-lg cursor-pointer hover:border-teal-500 transition-colors"
               [class.border-teal-600]="consultationType === 'scheduled'"
               [class.bg-teal-50]="consultationType === 'scheduled'">
          <input type="radio" [(ngModel)]="consultationType" name="type" value="scheduled" class="mr-2">
          <span>Scheduled</span>
        </label>
        <label class="flex items-center p-4 border rounded-lg cursor-pointer hover:border-teal-500 transition-colors"
               [class.border-teal-600]="consultationType === 'urgent'"
               [class.bg-teal-50]="consultationType === 'urgent'">
          <input type="radio" [(ngModel)]="consultationType" name="type" value="urgent" class="mr-2">
          <span>Urgent</span>
        </label>
        <label class="flex items-center p-4 border rounded-lg cursor-pointer hover:border-teal-500 transition-colors"
               [class.border-teal-600]="consultationType === 'follow-up'"
               [class.bg-teal-50]="consultationType === 'follow-up'">
          <input type="radio" [(ngModel)]="consultationType" name="type" value="follow-up" class="mr-2">
          <span>Follow-up</span>
        </label>
      </div>
    </div>

    <!-- Date and Time -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Date *</label>
        <input
          type="date"
          [(ngModel)]="scheduledDate"
          name="date"
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Time *</label>
        <input
          type="time"
          [(ngModel)]="scheduledTime"
          name="time"
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent">
      </div>
    </div>

    <!-- Reason -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Consultation reason *</label>
      <textarea
        [(ngModel)]="reason"
        name="reason"
        rows="4"
        required
        placeholder="Describe the reason for the consultation..."
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent"></textarea>
    </div>

    <!-- Actions -->
    <div class="flex justify-end gap-3 pt-4">
      <button
        type="button"
        (click)="cancel()"
        class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
        Cancel
      </button>
      <button
        type="submit"
        [disabled]="loading"
        class="px-6 py-2 bg-teal-600 hover:bg-teal-700 text-white rounded-lg transition-colors disabled:opacity-50">
        {{ loading ? 'Creating...' : 'Create Consultation' }}
      </button>
    </div>
  </form>
</div>
