<div class="p-6 max-w-4xl mx-auto">
  <h1 class="text-3xl font-bold text-gray-900 mb-6">New Prescription</h1>

  <div *ngIf="error" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-6">
    {{ error }}
  </div>

  <form (ngSubmit)="onSubmit()" class="space-y-6">
    <!-- Add Medication Form -->
    <div class="bg-white rounded-lg shadow-sm p-6">
      <h2 class="text-xl font-semibold text-gray-900 mb-4">Add Medication</h2>
      
      <div class="grid grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Medication Name *</label>
          <input
            type="text"
            [(ngModel)]="newMed.name"
            name="medName"
            placeholder="Ex: Doliprane 1000mg"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Dosage *</label>
          <input
            type="text"
            [(ngModel)]="newMed.dosage"
            name="medDosage"
            placeholder="Ex: 1000mg"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Frequency *</label>
          <input
            type="text"
            [(ngModel)]="newMed.frequency"
            name="medFrequency"
            placeholder="Ex: 3 times per day"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Duration *</label>
          <input
            type="text"
            [(ngModel)]="newMed.duration"
            name="medDuration"
            placeholder="Ex: 5 days"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500">
        </div>
      </div>
      
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2">Instructions</label>
        <textarea
          [(ngModel)]="newMed.instructions"
          name="medInstructions"
          rows="2"
          placeholder="Ex: Take with meals"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500"></textarea>
      </div>

      <button
        type="button"
        (click)="addMedication()"
        class="bg-brand-600 hover:bg-brand-700 text-white px-4 py-2 rounded-lg transition-colors shadow-sm">
        + Add This Medication
      </button>
    </div>

    <!-- Medications List -->
    <div class="bg-white rounded-lg shadow-sm p-6">
      <h2 class="text-xl font-semibold text-gray-900 mb-4">Added Medications ({{ medications.length }})</h2>
      
      <div *ngIf="medications.length === 0" class="text-center py-8 text-gray-600">
        No medications added
      </div>

      <div class="space-y-3">
        <div
          *ngFor="let med of medications; let i = index"
          class="border border-gray-200 rounded-lg p-4 flex justify-between items-start">
          <div class="flex-1">
            <h3 class="font-semibold text-gray-900">{{ med.name }}</h3>
            <p class="text-sm text-gray-600 mt-1">
              {{ med.dosage }} • {{ med.frequency }} • {{ med.duration }}
            </p>
            <p *ngIf="med.instructions" class="text-sm text-gray-700 mt-1">
              {{ med.instructions }}
            </p>
          </div>
          <button
            type="button"
            (click)="removeMedication(i)"
            class="text-red-600 hover:text-red-700 ml-4">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Pharmacy Notes -->
    <div class="bg-white rounded-lg shadow-sm p-6">
      <label class="block text-sm font-medium text-gray-700 mb-2">Pharmacy Notes</label>
      <textarea
        [(ngModel)]="pharmacyNotes"
        name="pharmacyNotes"
        rows="3"
        placeholder="Special instructions for the pharmacist..."
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500"></textarea>
    </div>

    <!-- Actions -->
    <div class="flex justify-end gap-3">
      <button
        type="button"
        (click)="cancel()"
        class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
        Cancel
      </button>
      <button
        type="submit"
        [disabled]="loading || medications.length === 0"
        class="px-6 py-2 bg-brand-600 hover:bg-brand-700 text-white rounded-lg transition-colors disabled:opacity-50 shadow-sm">
        {{ loading ? 'Creating...' : 'Create Prescription' }}
      </button>
    </div>
  </form>
</div>
