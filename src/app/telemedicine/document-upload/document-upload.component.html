<div class="p-6 max-w-3xl mx-auto">
  <h1 class="text-3xl font-bold text-gray-900 mb-6">Upload Document Médical</h1>

  <div *ngIf="error" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-6">
    {{ error }}
  </div>

  <form (ngSubmit)="onSubmit()" class="bg-white rounded-lg shadow-sm p-6 space-y-6">
    <!-- File Upload -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Fichier *</label>
      <input
        type="file"
        (change)="onFileSelected($event)"
        accept=".pdf,.jpg,.jpeg,.png,.doc,.docx"
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500">
      <p *ngIf="selectedFile" class="text-sm text-gray-600 mt-2">
        {{ selectedFile.name }} ({{ formatFileSize(selectedFile.size) }})
      </p>
    </div>

    <!-- Type -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Type de document *</label>
      <select
        [(ngModel)]="type"
        name="type"
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500">
        <option value="lab-result">Résultat d'analyse</option>
        <option value="imaging">Imagerie médicale</option>
        <option value="report">Rapport médical</option>
        <option value="prescription">Prescription</option>
        <option value="other">Autre</option>
      </select>
    </div>

    <!-- Title -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Titre *</label>
      <input
        type="text"
        [(ngModel)]="title"
        name="title"
        required
        placeholder="Ex: Analyse de sang complète"
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500">
    </div>

    <!-- Description -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
      <textarea
        [(ngModel)]="description"
        name="description"
        rows="3"
        placeholder="Description du document..."
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500"></textarea>
    </div>

    <!-- Exam Date -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Date de l'examen</label>
      <input
        type="date"
        [(ngModel)]="examDate"
        name="examDate"
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500">
    </div>

    <!-- Laboratory (conditional) -->
    <div *ngIf="type === 'lab-result'">
      <label class="block text-sm font-medium text-gray-700 mb-2">Laboratoire</label>
      <input
        type="text"
        [(ngModel)]="laboratory"
        name="laboratory"
        placeholder="Nom du laboratoire"
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500">
    </div>

    <!-- Radiologist (conditional) -->
    <div *ngIf="type === 'imaging'">
      <label class="block text-sm font-medium text-gray-700 mb-2">Radiologue</label>
      <input
        type="text"
        [(ngModel)]="radiologist"
        name="radiologist"
        placeholder="Nom du radiologue"
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500">
    </div>

    <!-- Actions -->
    <div class="flex justify-end gap-3 pt-4">
      <button
        type="button"
        (click)="cancel()"
        class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
        Annuler
      </button>
      <button
        type="submit"
        [disabled]="loading || !selectedFile"
        class="px-6 py-2 bg-teal-600 hover:bg-teal-700 text-white rounded-lg transition-colors disabled:opacity-50">
        {{ loading ? 'Upload...' : 'Upload Document' }}
      </button>
    </div>
  </form>
</div>
