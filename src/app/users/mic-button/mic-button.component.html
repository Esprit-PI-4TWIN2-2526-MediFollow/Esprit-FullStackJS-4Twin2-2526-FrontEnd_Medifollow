<button
  type="button"
  [title]="listening ? 'Arrêter l\'écoute' : 'Dicter ce champ'"
  [class]="listening ? btnListening : btnIdle"
  (click)="toggle()"
  [disabled]="!speech.isSupported">

  <!-- Micro (idle) -->
  <svg *ngIf="!listening"
    xmlns="http://www.w3.org/2000/svg" width="16" height="16"
    viewBox="0 0 20 20" fill="currentColor">
    <path d="M10 12a3 3 0 003-3V5a3 3 0 10-6 0v4a3 3 0 003 3z"/>
    <path fill-rule="evenodd"
      d="M5 9a1 1 0 112 0 3 3 0 006 0 1 1 0 112 0
         5 5 0 01-4 4.9V15h2a1 1 0 110 2H7a1 1 0
         110-2h2v-1.1A5 5 0 015 9z" clip-rule="evenodd"/>
  </svg>

  <!-- Stop (listening) -->
  <svg *ngIf="listening"
    xmlns="http://www.w3.org/2000/svg" width="16" height="16"
    viewBox="0 0 20 20" fill="currentColor">
    <rect x="5" y="5" width="10" height="10" rx="2"/>
  </svg>
</button>
