<header
  class="sticky top-0"
  style="
    background: #ffffff;
    border-bottom: 1px solid #e8f4f3;
    box-shadow: 0 1px 0 #e8f4f3, 0 4px 16px rgba(13,148,136,0.06);
    height: 66px;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 14px;
    width: 100%;
    z-index: 99998 !important;
    overflow: visible !important;
  ">

  <!-- Animated top line -->
  <div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#0d9488,#0ea5e9,#0d9488);background-size:200%;animation:slide 4s linear infinite;"></div>

  <!-- LEFT: Hamburger ONLY (no logo here — logo stays in sidebar) -->
  <div style="display:flex;align-items:center;gap:12px;flex-shrink:0;">

    <button
      (click)="handleToggle()"
      aria-label="Toggle Sidebar"
      style="width:40px;height:40px;border-radius:12px;background:#f0fafa;border:1.5px solid #cceceb;color:#0d9488;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;flex-shrink:0;"
      onmouseover="this.style.background='#d8f5f3';this.style.borderColor='#0d9488'"
      onmouseout="this.style.background='#f0fafa';this.style.borderColor='#cceceb'"
    >
      @if (isMobileOpen$ | async) {
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#0d9488"><path fill-rule="evenodd" clip-rule="evenodd" d="M6.21967 7.28131C5.92678 6.98841 5.92678 6.51354 6.21967 6.22065C6.51256 5.92775 6.98744 5.92775 7.28033 6.22065L11.999 10.9393L16.7176 6.22078C17.0105 5.92789 17.4854 5.92788 17.7782 6.22078C18.0711 6.51367 18.0711 6.98855 17.7782 7.28144L13.0597 12L17.7782 16.7186C18.0711 17.0115 18.0711 17.4863 17.7782 17.7792C17.4854 18.0721 17.0105 18.0721 16.7176 17.7792L11.999 13.0607L7.28033 17.7794C6.98744 18.0722 6.51256 18.0722 6.21967 17.7794C5.92678 17.4865 5.92678 17.0116 6.21967 16.7187L10.9384 12L6.21967 7.28131Z"/></svg>
      } @else {
        <svg width="16" height="12" viewBox="0 0 16 12" fill="#0d9488"><path fill-rule="evenodd" clip-rule="evenodd" d="M0.583252 1C0.583252 0.585788 0.919038 0.25 1.33325 0.25H14.6666C15.0808 0.25 15.4166 0.585786 15.4166 1C15.4166 1.41421 15.0808 1.75 14.6666 1.75L1.33325 1.75C0.919038 1.75 0.583252 1.41422 0.583252 1ZM0.583252 11C0.583252 10.5858 0.919038 10.25 1.33325 10.25L14.6666 10.25C15.0808 10.25 15.4166 10.5858 15.4166 11C15.4166 11.4142 15.0808 11.75 14.6666 11.75L1.33325 11.75C0.919038 11.75 0.583252 11.4142 0.583252 11ZM1.33325 5.25C0.919038 5.25 0.583252 5.58579 0.583252 6C0.583252 6.41421 0.919038 6.75 1.33325 6.75L7.99992 6.75C8.41413 6.75 8.74992 6.41421 8.74992 6C8.74992 5.58579 8.41413 5.25 7.99992 5.25L1.33325 5.25Z"/></svg>
      }
    </button>

    <!-- Breadcrumb pill: Hospitalisation > page -->
    <div class="hidden xl:flex" style="align-items:center;gap:0;">
      <div style="display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:30px;background:linear-gradient(135deg,#ecfdf5,#f0f9ff);border:1.5px solid #a7f3d0;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" style="color:#0d9488;flex-shrink:0;">
          <path d="M3 12h4l2-7 4 14 2-7h6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span style="font-size:11px;font-weight:700;color:#0d9488;letter-spacing:0.08em;text-transform:uppercase;white-space:nowrap;">Post-Hospitalisation</span>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" style="color:#9ecfca;"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
        <span style="font-size:12px;color:#64748b;font-weight:500;white-space:nowrap;">Tableau de bord</span>
      </div>
    </div>
  </div>

  <!-- CENTER: Search -->
  <div style="flex:1;max-width:440px;margin:0 auto;" class="hidden xl:block">
    <div style="position:relative;">
      <span style="position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#94a3b8;pointer-events:none;">
        <svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" clip-rule="evenodd" d="M3.04175 9.37363C3.04175 5.87693 5.87711 3.04199 9.37508 3.04199C12.8731 3.04199 15.7084 5.87693 15.7084 9.37363C15.7084 12.8703 12.8731 15.7053 9.37508 15.7053C5.87711 15.7053 3.04175 12.8703 3.04175 9.37363ZM9.37508 1.54199C5.04902 1.54199 1.54175 5.04817 1.54175 9.37363C1.54175 13.6991 5.04902 17.2053 9.37508 17.2053C11.2674 17.2053 13.003 16.5344 14.357 15.4176L17.177 18.238C17.4699 18.5309 17.9448 18.5309 18.2377 18.238C18.5306 17.9451 18.5306 17.4703 18.2377 17.1774L15.418 14.3573C16.5365 13.0033 17.2084 11.2669 17.2084 9.37363C17.2084 5.04817 13.7011 1.54199 9.37508 1.54199Z"/></svg>
      </span>
      <input
        #searchInput type="text"
        placeholder="Patient, médecin, service..."
        style="width:100%;height:40px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:12px;padding:0 80px 0 38px;font-size:13px;color:#1e293b;outline:none;transition:all 0.2s;"
        onfocus="this.style.borderColor='#0d9488';this.style.background='#fff';this.style.boxShadow='0 0 0 3px rgba(13,148,136,0.1)'"
        onblur="this.style.borderColor='#e2e8f0';this.style.background='#f8fafc';this.style.boxShadow='none'"
      />
      <kbd style="position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:10px;padding:3px 7px;border-radius:6px;background:#f1f5f9;border:1px solid #e2e8f0;color:#94a3b8;font-family:monospace;">⌘K</kbd>
    </div>
  </div>

  <!-- RIGHT -->
  <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:auto;overflow:visible !important;position:relative;z-index:1;">



    <!-- Status pills desktop -->
    <div class="hidden xl:flex" style="align-items:center;gap:6px;">

      <div style="display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:10px;background:#fef2f2;border:1px solid #fca5a5;">
        <span style="width:6px;height:6px;border-radius:50%;background:#ef4444;animation:hpulse 1.5s infinite;flex-shrink:0;"></span>
        <span style="font-size:11px;font-weight:700;color:#ef4444;white-space:nowrap;">3 alertes</span>
      </div>
    </div>

    <div class="hidden xl:block" style="width:1px;height:26px;background:#e2e8f0;"></div>

    <app-theme-toggle-button />
    <app-notification-dropdown />
    <app-user-dropdown />
  </div>

  <!-- Mobile expanded -->
  <div [ngClass]="isApplicationMenuOpen ? 'block' : 'hidden'"
    style="position:absolute;top:66px;left:0;right:0;padding:14px 16px;background:#fff;border-bottom:2px solid #e8f4f3;box-shadow:0 8px 20px rgba(0,0,0,0.08);z-index:10;">
    <input type="text" placeholder="Rechercher..."
      style="width:100%;height:40px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:0 14px;font-size:13px;color:#1e293b;outline:none;margin-bottom:10px;display:block;"/>
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div style="display:flex;gap:8px;"><app-theme-toggle-button /><app-notification-dropdown /></div>
      <app-user-dropdown />
    </div>
  </div>

</header>

<style>
@keyframes slide{0%{background-position:0 0}100%{background-position:200% 0}}
@keyframes hpulse{0%,100%{opacity:1}50%{opacity:0.4}}
header input::placeholder{color:#94a3b8}
</style>
