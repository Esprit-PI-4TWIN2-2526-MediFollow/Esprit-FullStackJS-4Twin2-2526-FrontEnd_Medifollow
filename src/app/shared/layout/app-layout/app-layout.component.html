<!--
  ╔══════════════════════════════════════════════════════╗
  ║  STRUCTURE CORRECTE DU LAYOUT                       ║
  ║                                                      ║
  ║  <div class="layout-wrapper">                        ║
  ║    <app-sidebar />          ← fixed, left            ║
  ║                                                      ║
  ║    <div class="content-area">   ← margin-left auto   ║
  ║      <app-header />         ← sticky, inside here   ║
  ║      <main>...</main>                                ║
  ║    </div>                                            ║
  ║  </div>                                              ║
  ╚══════════════════════════════════════════════════════╝
-->

<!-- app.component.html ou layout.component.html -->
<div style="display:flex;min-height:100vh;background:#f8fafb;">

  <!-- SIDEBAR (fixed, positioned by its own CSS) -->
  <app-sidebar />

  <!-- CONTENT AREA — pousse à droite selon la largeur du sidebar -->
  <div
    class="content-wrapper transition-all duration-300"
    [ngClass]="{
      'xl:ml-[268px]': (isExpanded$ | async) || (isHovered$ | async),
      'xl:ml-[72px]':  !((isExpanded$ | async) || (isHovered$ | async))
    }"
    style="flex:1;min-width:0;display:flex;flex-direction:column;"
  >
    <!-- HEADER — sticky, seulement dans la zone de contenu -->
    <app-header />

    <!-- PAGE CONTENT -->
    <main style="flex:1;padding:24px;">
      <router-outlet />
    </main>
  </div>

</div>
