
<div style="display:flex;min-height:100vh;background:#f8fafb;">
  <app-sidebar />

  <div
    class="content-wrapper transition-all duration-300"
    [ngClass]="{
      'xl:ml-[272px]': (isExpanded$ | async) || (isHovered$ | async),
      'xl:ml-[72px]':  !((isExpanded$ | async) || (isHovered$ | async))
    }"
    style="flex:1;min-width:0;display:flex;flex-direction:column;padding-top:66px;"
  >
    <app-header />

    <main style="flex:1;padding:24px;">
      <router-outlet />
    </main>
  </div>

</div>
