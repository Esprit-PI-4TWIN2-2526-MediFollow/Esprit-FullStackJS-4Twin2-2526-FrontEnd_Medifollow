<div class="notification-container">
  <button 
    (click)="toggleDropdown()"
    class="notification-bell"
    [class.has-unread]="(unreadCount$ | async)! > 0"
    aria-label="Notifications">
    
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
    </svg>
    
    <span class="notification-badge" *ngIf="(unreadCount$ | async)! > 0">
      {{ unreadCount$ | async }}
    </span>
  </button>

  <div class="notification-dropdown" *ngIf="isOpen">
    <div class="dropdown-header">
      <div class="header-content">
        <h3>Notifications</h3>
        <span class="unread-count" *ngIf="(unreadCount$ | async)! > 0">
          {{ unreadCount$ | async }} new
        </span>
      </div>
      <button (click)="markAllAsRead()" class="mark-all-btn" *ngIf="(unreadCount$ | async)! > 0">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        Mark all read
      </button>
    </div>

    <div class="notification-list">
      <div class="empty-state" *ngIf="(notifications$ | async)?.length === 0">
        <div class="empty-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
        </div>
        <h4>All caught up!</h4>
        <p>You have no new notifications</p>
      </div>

      <div 
        *ngFor="let notification of notifications$ | async; trackBy: trackByNotificationId"
        class="notification-item"
        [class.unread]="!notification.isRead"
        [attr.data-priority]="notification.priority"
        (click)="handleNotificationClick(notification)">
        
        <div class="notification-icon-wrapper" [attr.data-type]="notification.type">
          <span class="notification-emoji">{{ getIcon(notification.type) }}</span>
        </div>

        <div class="notification-content">
          <div class="notification-header">
            <span class="notification-title">{{ notification.title }}</span>
            <span class="notification-time">{{ getTimeAgo(notification.createdAt) }}</span>
          </div>
          
          <p class="notification-message">{{ notification.message }}</p>
          
          <div class="notification-footer" *ngIf="notification.patientId">
            <div class="patient-info">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
              <span>{{ notification.patientId.firstName }} {{ notification.patientId.lastName }}</span>
            </div>
          </div>
        </div>

        <div class="notification-indicator" *ngIf="!notification.isRead"></div>
      </div>
    </div>

    <div class="dropdown-footer">
      <button (click)="viewAllNotifications()" class="view-all-btn">
        View all notifications
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </div>
  </div>
</div>
