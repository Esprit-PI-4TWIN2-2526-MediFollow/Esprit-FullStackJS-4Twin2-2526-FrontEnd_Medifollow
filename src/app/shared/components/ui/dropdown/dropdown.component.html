@if (isOpen) {
<!-- Backdrop -->
<div 
  style="position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important; z-index: 2147483646 !important; background: transparent !important; pointer-events: none !important;"
  (click)="close.emit()">
</div>

<!-- Dropdown -->
<div
  #dropdownRef
  [ngClass]="className"
  style="position: fixed !important; z-index: 2147483647 !important; right: 20px !important; top: 70px !important; background: white !important; border-radius: 1rem !important; border: 1px solid #e5e7eb !important; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04) !important; min-width: 260px !important; padding: 12px !important; pointer-events: auto !important;"
  class="dark:!bg-gray-900 dark:!border-gray-800"
>
  <ng-content></ng-content>
</div>
}
