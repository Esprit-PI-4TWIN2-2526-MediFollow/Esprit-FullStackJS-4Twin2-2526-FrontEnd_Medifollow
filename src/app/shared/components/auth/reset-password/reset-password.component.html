<div class="w-full max-w-xl mx-auto mb-5 sm:pt-10">
  <a
    routerLink="/signin"
    class="inline-flex items-center gap-2 text-sm text-gray-500 transition-colors hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 20 20" fill="none" class="size-5">
      <path d="M12.7083 5L7.5 10.2083L12.7083 15.4167" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
    </svg>
    Back to sign in
  </a>
</div>

<div class="flex flex-col justify-center flex-1 w-full max-w-xl  mx-auto">
  <div class="relative overflow-hidden border border-gray-200 shadow-theme-sm rounded-2xl bg-white/90 p-7 dark:border-gray-800 dark:bg-gray-900/80 sm:p-8">
    <div class="pointer-events-none absolute -right-20 -top-20 h-44 w-44 rounded-full bg-brand-200/40 blur-3xl"></div>
    <div class="pointer-events-none absolute -left-16 -bottom-16 h-36 w-36 rounded-full bg-brand-500/15 blur-3xl"></div>

    <div class="relative">
      <div class="mb-6">
        <h1 class="mb-2 text-title-sm font-semibold text-gray-800 dark:text-white/90 sm:text-title-md">
          Create New Password
        </h1>
        <p class="text-sm text-gray-500 dark:text-gray-400">
          Enter your new password to complete the reset process.
        </p>
      </div>

      <form class="space-y-5" (ngSubmit)="onSubmit()">
        <div>
          <app-label>New Password <span class="text-error-500">*</span></app-label>
          <app-input-field
            type="password"
            name="password"
            placeholder="Enter new password"
            [value]="password"
            (valueChange)="password = $any($event)"
            required
          />
        </div>

        <div>
          <app-label>Confirm Password <span class="text-error-500">*</span></app-label>
          <app-input-field
            type="password"
            name="confirmPassword"
            placeholder="Re-enter new password"
            [value]="confirmPassword"
            (valueChange)="confirmPassword = $any($event)"
            required
          />
        </div>

        @if (successMessage) {
          <p class="text-sm text-success-500">{{ successMessage }}</p>
        }
        @if (errorMessage) {
          <p class="text-sm text-error-500">{{ errorMessage }}</p>
        }

        <button
          type="submit"
          [disabled]="loading"
          class="inline-flex w-full items-center justify-center gap-2 rounded-lg bg-brand-500 px-4 py-3 text-sm font-medium text-white shadow-theme-xs transition hover:bg-brand-600"
        >
          {{ loading ? 'Resetting...' : 'Reset Password' }}
        </button>
      </form>
    </div>
  </div>
</div>
