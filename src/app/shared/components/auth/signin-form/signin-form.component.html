<div class="w-full max-w-md pt-10 mx-auto">
  <a
    routerLink="/"
    class="inline-flex items-center text-sm text-gray-500 transition-colors hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 20 20" fill="none" class="size-5">
      <path d="M12.7083 5L7.5 10.2083L12.7083 15.4167" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
    </svg>
    Back to dashboard
  </a>
</div>

<div class="flex flex-col justify-center flex-1 w-full max-w-md mx-auto">
  <div>
    <div class="mb-5 sm:mb-8">
      <h1 class="mb-2 font-semibold text-gray-800 text-title-sm dark:text-white/90 sm:text-title-md">
        Connexion
      </h1>
      <p class="text-sm text-gray-500 dark:text-gray-400">
        Entrez vos identifiants pour accéder à votre espace.
      </p>
    </div>

    <p *ngIf="infoMessage" class="mb-4 rounded-lg bg-blue-50 px-4 py-3 text-sm text-blue-700 dark:bg-blue-900/20 dark:text-blue-300">
      {{ infoMessage }}
    </p>
    <p *ngIf="errorMessage" class="mb-4 rounded-lg bg-red-50 px-4 py-3 text-sm text-red-700 dark:bg-red-900/20 dark:text-red-300">
      {{ errorMessage }}
    </p>

    <form [formGroup]="loginForm" (ngSubmit)="onSignIn()" class="space-y-6">

      <!-- EMAIL -->
      <div>
        <label class="block mb-1">Email <span class="text-error-500">*</span></label>
        <input
          type="email"
          placeholder="info@gmail.com"
          formControlName="email"
          [ngClass]="{
            'border-red-500': loginForm.get('email')?.touched && loginForm.get('email')?.invalid
          }"
          class="w-full border rounded p-2"
        />
        <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
             class="text-sm text-red-500 mt-1">
          <p *ngIf="loginForm.get('email')?.errors?.['required']">Email obligatoire.</p>
          <p *ngIf="loginForm.get('email')?.errors?.['email']">Format email invalide.</p>
          <p *ngIf="loginForm.get('email')?.errors?.['maxlength']">100 caractères max.</p>
        </div>
      </div>

      <!-- PASSWORD -->
      <div>
        <label class="block mb-1">Mot de passe <span class="text-error-500">*</span></label>
        <div class="relative">
          <input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Entrez votre mot de passe"
            formControlName="password"
            [ngClass]="{
              'border-red-500': loginForm.get('password')?.touched && loginForm.get('password')?.invalid
            }"
            class="w-full border rounded p-2 pr-10"
          />
          <button
            type="button"
            (click)="togglePasswordVisibility()"
            class="absolute right-3 top-1/2 z-30 inline-flex -translate-y-1/2 items-center justify-center rounded-md p-1 text-gray-500 transition hover:bg-gray-100 hover:text-gray-700"
            [attr.aria-label]="showPassword ? 'Masquer le mot de passe' : 'Afficher le mot de passe'"
            [title]="showPassword ? 'Masquer le mot de passe' : 'Afficher le mot de passe'"
          >
            <svg
              *ngIf="showPassword; else hiddenPasswordIcon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 20 20"
              fill="currentColor"
              class="h-5 w-5"
            >
              <path d="M10 4.5c-3.827 0-7.076 2.323-8.25 5.5 1.174 3.177 4.423 5.5 8.25 5.5s7.076-2.323 8.25-5.5C17.076 6.823 13.827 4.5 10 4.5Zm0 9a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7Z" />
              <path d="M10 8a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z" />
            </svg>
            <ng-template #hiddenPasswordIcon>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 20 20"
                fill="currentColor"
                class="h-5 w-5"
              >
                <path d="M3.28 2.22a.75.75 0 0 0-1.06 1.06l2.03 2.03A9.94 9.94 0 0 0 1.75 10c1.174 3.177 4.423 5.5 8.25 5.5 1.662 0 3.228-.439 4.582-1.205l2.138 2.138a.75.75 0 1 0 1.06-1.06l-14.5-14.5Zm7.572 10.754A3.5 3.5 0 0 1 7.026 9.15l3.826 3.825Zm1.738-.677-5.887-5.886A8.235 8.235 0 0 1 10 4.5c3.827 0 7.076 2.323 8.25 5.5a9.786 9.786 0 0 1-2.544 3.63l-1.348-1.348A3.48 3.48 0 0 0 14.5 11c0-1.933-1.567-3.5-3.5-3.5-.464 0-.907.09-1.313.254l-1.32-1.32A3.49 3.49 0 0 1 11 6.5c1.933 0 3.5 1.567 3.5 3.5 0 .597-.15 1.16-.41 1.652l-1.5-1.5Z" />
              </svg>
            </ng-template>
          </button>
        </div>
        <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
             class="text-sm text-red-500 mt-1">
          <p *ngIf="loginForm.get('password')?.errors?.['required']">Mot de passe obligatoire.</p>


        </div>
      </div>

      <div class="flex items-center justify-between">
        <label class="flex items-center space-x-2">
          <input type="checkbox"  />
          <span>Rester connecté</span>
        </label>
        <a
          routerLink="/forgot-password"
          class="text-sm text-brand-500 hover:text-brand-600 dark:text-brand-400"
        >
          Mot de passe oublié ?
        </a>
      </div>

      <button
        type="submit"
        [disabled]="loginForm.invalid || isLoading"
        class="w-full bg-brand-500 text-white rounded p-2 hover:bg-brand-600 disabled:opacity-50"
      >
        {{ isLoading ? 'Connexion en cours...' : 'Se connecter' }}
      </button>

      <!-- Face ID Login Button -->
      <button
        *ngIf="showFaceIdButton && !showCamera"
        type="button"
        (click)="onFaceIdLogin()"
        [disabled]="isFaceIdLoading || !loginForm.get('email')?.value"
        class="w-full flex items-center justify-center gap-2 bg-gray-100 text-gray-800 rounded p-2 hover:bg-gray-200 disabled:opacity-50 dark:bg-gray-800 dark:text-white dark:hover:bg-gray-700"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
        </svg>
        {{ isFaceIdLoading ? 'Opening camera...' : 'Login with Face ID' }}
      </button>

      <!-- Camera Preview for Face Login -->
      <div *ngIf="showCamera" class="mt-4 p-4 bg-gray-50 rounded-lg dark:bg-gray-800">
        <p class="text-center mb-3 font-medium text-gray-700 dark:text-gray-300">
          📸 Look at the camera
        </p>
        <div class="flex justify-center">
          <video
            id="loginCameraPreview"
            autoplay
            playsinline
            class="rounded-lg border-4 border-brand-500 shadow-lg"
            style="max-width: 400px; width: 100%; transform: scaleX(-1);">
          </video>
        </div>
        <div class="flex justify-center gap-3 mt-4">
          <button
            type="button"
            (click)="captureFaceForLogin()"
            class="inline-flex items-center gap-2 px-6 py-2 text-sm font-medium text-white bg-green-600 rounded-lg hover:bg-green-700">
             Capture & Login
          </button>
          <button
            type="button"
            (click)="cancelFaceLogin()"
            class="inline-flex items-center gap-2 px-6 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600 dark:hover:bg-gray-600">
            Cancel
          </button>
        </div>
      </div>
    </form>

    <!-- <div class="mt-5">
      <p class="text-sm font-normal text-center text-gray-700 dark:text-gray-400 sm:text-start">
        Don't have an account?
        <a
          routerLink="/signup"
          class="text-brand-500 hover:text-brand-600 dark:text-brand-400"
        >
          Sign Up
        </a>
      </p>
    </div> -->
  </div>
</div>
