<div class="w-full max-w-xl mx-auto mb-5 sm:pt-10">
  <a
    routerLink="/signin"
    class="inline-flex items-center gap-2 text-sm text-gray-500 transition-colors hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 20 20" fill="none" class="size-5">
      <path d="M12.7083 5L7.5 10.2083L12.7083 15.4167" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
    </svg>
    Back to sign in
  </a>
</div>

<div class="flex flex-col justify-center flex-1 w-full max-w-xl  mx-auto">
  <div class="relative overflow-hidden border border-gray-200 shadow-theme-sm rounded-2xl bg-white/90 p-7 dark:border-gray-800 dark:bg-gray-900/80 sm:p-8">
    <div class="pointer-events-none absolute -right-20 -top-20 h-44 w-44 rounded-full bg-brand-200/40 blur-3xl"></div>
    <div class="pointer-events-none absolute -left-16 -bottom-16 h-36 w-36 rounded-full bg-brand-500/15 blur-3xl"></div>

    <div class="relative">
      <div class="mb-6">
        <span class="mb-4 inline-flex h-12 w-12 items-center justify-center rounded-xl bg-brand-50 text-brand-600 dark:bg-brand-500/15 dark:text-brand-300">
          <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" class="size-6">
            <path d="M4 8.5C4 7.11929 5.11929 6 6.5 6H17.5C18.8807 6 20 7.11929 20 8.5V15.5C20 16.8807 18.8807 18 17.5 18H6.5C5.11929 18 4 16.8807 4 15.5V8.5Z" stroke="currentColor" stroke-width="1.5"></path>
            <path d="M4.75 8L11.0537 12.4126C11.6309 12.8167 12.4024 12.8167 12.9797 12.4126L19.25 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
          </svg>
        </span>

        <h1 class="mb-2 text-title-sm font-semibold text-gray-800 dark:text-white/90 sm:text-title-md">
          Reset Password
        </h1>
        <p class="text-sm text-gray-500 dark:text-gray-400">
          Enter your email and we will send you a secure reset link.
        </p>
      </div>

      <form class="space-y-5">
        <div>
          <app-label>Email Address <span class="text-error-500">*</span></app-label>
          <div class="relative">
            <span class="pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-brand-500 dark:text-brand-400">
              <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 20 20" fill="none" class="size-5">
                <path d="M2.5 5.83333C2.5 4.91286 3.24619 4.16667 4.16667 4.16667H15.8333C16.7538 4.16667 17.5 4.91286 17.5 5.83333V14.1667C17.5 15.0871 16.7538 15.8333 15.8333 15.8333H4.16667C3.24619 15.8333 2.5 15.0871 2.5 14.1667V5.83333Z" stroke="currentColor" stroke-width="1.5"></path>
                <path d="M3.3335 5L9.05752 9.00682C9.63535 9.4113 10.4103 9.4113 10.9881 9.00682L16.6668 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
              </svg>
            </span>
            <app-input-field
              type="email"
              name="email"
              placeholder="you@example.com"
              className="pl-11"
              required
            />
          </div>
        </div>

        <button
          type="button"
          class="inline-flex w-full items-center justify-center gap-2 rounded-lg bg-brand-500 px-4 py-3 text-sm font-medium text-white shadow-theme-xs transition hover:bg-brand-600"
        >
          Send Reset Link
          <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 20 20" fill="none" class="size-5">
            <path d="M3.3335 10H16.6668" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
            <path d="M11.6665 5L16.6665 10L11.6665 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </button>
      </form>

      <p class="mt-5 text-center text-sm text-gray-600 dark:text-gray-400">
        Remember your password?
        <a routerLink="/signin" class="font-medium text-brand-500 hover:text-brand-600 dark:text-brand-400">
          Sign in
        </a>
      </p>
    </div>
  </div>
</div>
