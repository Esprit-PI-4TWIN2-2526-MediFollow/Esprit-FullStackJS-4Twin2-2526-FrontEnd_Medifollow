apiVersion: apps/v1
kind: Deployment
metadata:
  name: medifollow-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medifollow-frontend
  template:
    metadata:
      labels:
        app: medifollow-frontend
    spec:
      containers:
      - name: frontend
        image: yahyakaroui/medifollow-frontend:latest
        ports:
        - containerPort: 80